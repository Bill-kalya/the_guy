name: the_guy
description: "The Guy - Service Provider App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_maps_flutter: ^2.5.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  flutter_screenutil: ^5.9.0
  lottie: ^2.7.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Networking
  dio: ^5.3.2
  socket_io_client: ^2.0.3
  stomp_dart_client: ^0.4.2
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Media
  image_picker: ^1.0.4
  permission_handler: ^10.4.3
  audioplayers: ^5.2.1
  
  # Charts & Utilities
  fl_chart: ^0.66.0
  intl: ^0.18.1
  equatable: ^2.0.5
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/